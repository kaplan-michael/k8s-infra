apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubernetes-ingress-controller
  namespace: infra
spec:
  destination:
    namespace: haproxy-ingress-controller
    server: https://kubernetes.default.svc
  project: infra
  source:
    path: k0s-prod/argocd/haproxy-ingress
    repoURL: https://github.com/kaplan-michael/k8s-infra.git
    targetRevision: HEAD
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

